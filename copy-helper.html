
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>小说章节复制助手 - 官方网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 保留现代字体作为后备，但标题使用衬线增加书卷气 */
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }

        body {
            /* 暖麻布渐变 + 手工纸纹理叠加 */
            background: linear-gradient(145deg, #e7d7bb 0%, #d6bf9c 100%), 
                        repeating-linear-gradient(45deg, rgba(140, 100, 70, 0.04) 0px, rgba(140, 100, 70, 0.04) 3px, transparent 3px, transparent 9px);
            background-blend-mode: overlay;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* 主卡片 — 仿古宣纸效果 */
        .main-card {
            max-width: 1200px;
            width: 100%;
            background: rgba(248, 238, 216, 0.75);        /* 牙色底 */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 48px;
            box-shadow: 0 30px 50px -20px rgba(70, 40, 20, 0.4), 0 0 0 1px #cbad87 inset, 0 0 0 2px rgba(255, 245, 220, 0.6) inset;
            padding: 2.5rem 2rem;
            transition: box-shadow 0.3s ease;
            border: 1px solid #dabd9b;
        }

        /* 头部区域 */
        .header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .logo-wrapper {
            background: #ecdbbc80;           /* 旧米色 */
            border-radius: 32px;
            padding: 0.5rem;
            box-shadow: 0 10px 20px -8px #896e4e;
            backdrop-filter: blur(4px);
            border: 1px solid #e2c7a2;
        }

        .logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            display: block;
            filter: sepia(0.2) contrast(1.1); /* 轻微做旧logo */
        }

        .title-group h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #4f3a26;                               /* 深褐古色 */
            letter-spacing: -0.02em;
            line-height: 1.2;
            text-shadow: 1px 1px 0 #e9d8be;               /* 浅影增加立体 */
        }

        .title-group .version-badge {
            background: #d6bc9b60;            /* 半透米色 */
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 1rem;
            color: #543f28;                    /* 深咖啡 */
            border: 1px solid #c8a87c;
            display: inline-block;
            margin-top: 0.4rem;
            backdrop-filter: blur(4px);
        }

        .author-tag {
            margin-left: auto;
            background: #dfccb0;                /* 暖灰褐 */
            border-radius: 60px;
            padding: 0.5rem 1.5rem;
            font-weight: 500;
            color: #3f2d19;
            box-shadow: 0 2px 8px rgba(70, 40, 10, 0.1);
            font-size: 1.1rem;
            border: 1px solid #f7e5ca;
        }

        /* 主要内容区：截图+简介双栏 */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-bottom: 3rem;
        }

        /* 左侧截图卡片 */
        .screenshot-area {
            background: #f6e7d4cc;              /* 米白 */
            border-radius: 36px;
            padding: 1.5rem;
            box-shadow: 0 20px 30px -12px #8b6743;
            backdrop-filter: blur(8px);
            border: 1px solid #eddec9;
        }

        .screenshot-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b6e4b;                     /* 土褐 */
            margin-bottom: 0.8rem;
        }

        .image-wrapper {
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 12px 24px -8px #593e24;  /* 暖褐阴影 */
            background: #e1cfb3;
            cursor: pointer;
            transition: box-shadow 0.3s ease;
            border: 1px solid #c9aa81;
        }

        .image-wrapper:hover {
            box-shadow: 0 20px 30px -8px #6c4c2e;
        }

        #software-screenshot {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            will-change: transform;
            pointer-events: none;
            filter: sepia(0.15) contrast(1.02);   /* 轻微做旧图片 */
        }

        .image-wrapper:hover #software-screenshot {
            transform: scale(1.02);
        }

        .hint-text {
            margin-top: 0.8rem;
            font-size: 0.9rem;
            color: #7b6240;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .hint-text i {
            font-style: normal;
            background: #dec29b;                 /* 浅卡其 */
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #2f1f0e;
        }

        /* 右侧信息卡片 */
        .info-panel {
            background: rgba(250, 239, 217, 0.7); /* 半透米色 */
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 1rem 2rem 2.2rem 2rem;
            border: 1px solid #f7e1c1;
            box-shadow: 0 15px 30px -12px #6a4c2e;
        }

        .software-description {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #2f1d0d;                       /* 深褐 */
            font-weight: 500;
            margin-bottom: 2rem;
            border-left: 6px solid #b68654;        /* 仿古红铜 */
            padding-left: 1.2rem;
            background: linear-gradient(to right, #fdf3e2, transparent);
            border-radius: 0 20px 20px 0;
        }

        .spec-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0rem 1.5rem;
            margin-bottom: 1rem;
        }

        .spec-item {
            background: #f6e6cfdd;                /* 米黄 */
            border-radius: 28px;
            padding: 0.7rem 1.3rem;
            backdrop-filter: blur(2px);
            border: 1px solid #f9ebd2;
            box-shadow: 0 5px 12px rgba(110, 70, 30, 0.08);
        }

        .spec-label {
            font-size: 0.8rem;
            color: #8f714c;                        /* 栗色 */
            letter-spacing: 0.3px;
            margin-bottom: 0.2rem;
        }

        .spec-value {
            font-weight: 650;
            font-size: 1.2rem;
            color: #2f1e10;                         /* 深棕色 */
        }

        .spec-value small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #856e48;
            margin-left: 0.3rem;
        }

        .download-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1.2rem;
            margin-top: 1.2rem;
        }

        .download-btn {
            background: #7b5837;                    /* 赭褐色 */
            color: #fef5e6;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 15px 20px -10px #4a3421;
            transition: all 0.2s ease;
            text-decoration: none;
            border: 1px solid #e5c9a6;
            backdrop-filter: blur(4px);
            cursor: pointer;
        }

        .download-btn:hover {
            background: #946d44;                    /* 暖棕 */
            transform: translateY(-3px);
            box-shadow: 0 22px 28px -10px #5f3f25;
        }

        .download-info {
            color: #3f2d18;
            font-weight: 500;
            background: #ebd9bd;                    /* 米白 */
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 1rem;
            border: 1px solid #cfb692;
        }

        .footer-note {
            margin-top: 2rem;
            text-align: center;
            color: #6b5439;                          /* 深茶色 */
            font-size: 0.95rem;
            border-top: 1px dashed #d0b48b;
            padding-top: 2rem;
        }

        /* 模态框 (全分辨率查看) — 深木色调 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(35, 25, 15, 0.85);       /* 深褐遮罩 */
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #32281c;                       /* 老木色 */
            border-radius: 32px;
            padding: 1.2rem;
            box-shadow: 0 30px 60px #1f130b;
            max-width: 95vw;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #b4966b;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0.5rem 0.8rem 0.5rem;
            color: #eedbc5;
        }

        .modal-header span {
            font-size: 0.95rem;
            color: #efdbbc;
            background: #5c4935;                       /* 深褐背景 */
            padding: 0.2rem 1rem;
            border-radius: 40px;
            border: 1px solid #af8f64;
        }

        .close-modal {
            background: #5e4a35;
            border: none;
            color: #ffeedb;
            font-size: 1.8rem;
            line-height: 1;
            width: 44px;
            height: 44px;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            border: 1px solid #dbbc93;
        }

        .close-modal:hover {
            background: #7e6243;
        }

        /* 图片滚动容器 */
        .modal-image-container {
            overflow: auto;
            background: #241e15;                       /* 深棕 */
            border-radius: 24px;
            border: 1px solid #876e48;
            scrollbar-width: thin;
            scrollbar-color: #bb9e78 #3d2f1f;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .modal-image-container::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        .modal-image-container::-webkit-scrollbar-track {
            background: #3d2f1f;
            border-radius: 10px;
        }
        .modal-image-container::-webkit-scrollbar-thumb {
            background: #bb9e78;
            border-radius: 10px;
            border: 1px solid #6e4f30;
        }

        #modal-img {
            display: block;
            width: 1023px;        /* 原始宽度全分辨率 */
            height: auto;
            object-fit: contain;
            background: #3d2c1b;  /* 深色底衬 */
            transition: width 0.08s ease-out;
            cursor: zoom-in;
            transform-origin: top left;
            filter: sepia(0.2);   /* 模态框内图片也微调复古 */
        }

        .zoom-hint {
            text-align: center;
            color: #e3cfb2;
            font-size: 0.85rem;
            margin-top: 0.7rem;
        }

        /* 响应式调整 */
        @media (max-width: 800px) {
            .hero { grid-template-columns: 1fr; }
            .title-group h1 { font-size: 2rem; }
            .main-card { padding: 1.8rem; }
            .author-tag { margin-left: 0; }
        }
        @media (max-width: 480px) {
            .spec-list { grid-template-columns: 1fr; }
        }

        /* 额外点缀：标签“绿色单文件”样式 */
        .info-panel > div[style*="background: #deeaff"] {
            background: #e5cfb3 !important;           /* 米褐 */
            color: #3a2a17 !important;
            border: 1px solid #b79873;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- 头部区 -->
        <div class="header">
            <div class="logo-wrapper">
                <img src="logo.png" alt="程序图标" class="logo" onerror="this.src='https://via.placeholder.com/128?text=logo'">
            </div>
            <div class="title-group">
                <h1>小说章节复制助手</h1>
                <div class="version-badge">帮助小说作者快速复制章节正文</div>
            </div>
            <div class="author-tag">
                👤 作者：自来水
            </div>
        </div>

        <!-- 核心展示区 -->
        <div class="hero">
            <!-- 左侧软件截图 -->
            <div class="screenshot-area">
                <div class="image-wrapper" id="screenshot-wrapper">
                    <img src="software.png" alt="软件界面截图" id="software-screenshot" width="1023" height="680" style="max-width:100%; height:auto;">
                </div>
                <div class="hint-text">
                    <i>📸 软件界面截图</i>
                </div>
            </div>

            <!-- 右侧详情与下载 -->
            <div class="info-panel">
                <div class="software-description">
                    📖 它能简化复制章节的流程，一键复制出TXT文件中的卷名、卷首语、卷尾语、章节名、章节正文，帮助小说作者快速复制所需内容。
                </div>
                <div class="spec-list">
                    <div class="spec-item">
                        <div class="spec-label">最新版本</div>
                        <div class="spec-value">1.0</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">发布时间</div>
                        <div class="spec-value">2026.03.16</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">软件大小</div>
                        <div class="spec-value">0.7 MB</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">适用平台</div>
                        <div class="spec-value">Windows<small>11/10/8/7/Vista/XP</small></div>
                    </div>
                </div>
                <div class="download-area">
                    <a href="https://raw.githubusercontent.com/FangHeXie/download/refs/heads/master/copy-helper_v1.0.rar" class="download-btn" target="_blank" rel="noopener">
                        ⬇  下载 .rar
                    </a>
                    <span class="download-info" font-size:0.95rem;>✅免安装 ✅无捆绑 ✅完全免费</span>
                </div>
                <div style="margin-top: 1rem; color: #3f5780; font-size:0.95rem; background: #deeaff; padding: 0.4rem 1.2rem; border-radius: 60px; display: inline-block;">
软件站分流：等待添加</div>
            </div>
        </div>

        <!-- 脚注 -->
        <div class="footer-note">
            © 2026 小说章节复制助手 · 让创作更流畅
        </div>
    </div>

    <!-- ========== 全分辨率图片模态框 ========== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <span>软件界面 · 滚轮缩放</span>
                <button class="close-modal" id="closeModalBtn" aria-label="关闭">&times;</button>
            </div>
            <!-- 可滚动容器 -->
            <div class="modal-image-container" id="modalImageContainer">
                <img src="software.png" alt="全分辨率界面" id="modal-img">
            </div>
            <div class="zoom-hint">
                ⚡ 鼠标滚轮放大/缩小 · 拖动滚动条查看细节
            </div>
        </div>
    </div>

    <script>
        (function() {
            // 获取元素
            const modalOverlay = document.getElementById('modalOverlay');
            const modalImg = document.getElementById('modal-img');
            const closeBtn = document.getElementById('closeModalBtn');
            const screenshotWrapper = document.getElementById('screenshot-wrapper');

            // 滚轮缩放变量
            let currentImgWidth = 1023;
            const MIN_WIDTH = 200;
            const MAX_WIDTH = 4000;

            function openModal() {
                modalImg.style.width = '1023px';
                currentImgWidth = 1023;
                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            if (screenshotWrapper) {
                screenshotWrapper.addEventListener('click', openModal);
            }

            if (closeBtn) {
                closeBtn.addEventListener('click', closeModal);
            }

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    closeModal();
                }
            });

            window.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                    closeModal();
                }
            });

            // 滚轮缩放
            modalImg.addEventListener('wheel', function(e) {
                e.preventDefault();
                e.stopPropagation();

                const delta = e.deltaY || e.detail || 0;
                let scaleFactor = delta > 0 ? 0.9 : 1.1;

                let newWidth = currentImgWidth * scaleFactor;
                if (newWidth < MIN_WIDTH) newWidth = MIN_WIDTH;
                if (newWidth > MAX_WIDTH) newWidth = MAX_WIDTH;

                modalImg.style.width = newWidth + 'px';
                currentImgWidth = newWidth;
            }, { passive: false });
        })();
    </script>
</body>
</html>
